name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: okta-template-downloader-linux-x86_64
            binary_name: okta-template-downloader
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: okta-template-downloader-macos-x86_64
            binary_name: okta-template-downloader
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: okta-template-downloader-macos-aarch64
            binary_name: okta-template-downloader
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: okta-template-downloader-windows-x86_64.exe
            binary_name: okta-template-downloader.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
